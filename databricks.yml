bundle:
  name: snap-dbx-framework

variables:
  config_root:
    description: "Workspace path to the framework config directory (ev_config_root in framework.yml)."
    default: /Workspace/Users/dennehy.jack01@gmail.com/snap-dbx-framework/config

resources:
  pipelines:
    snap_dbx_framework:
      name: snap-dbx-framework
      serverless: true
      configuration:
        ev_config_root:    ${var.config_root}
        ev_end_date:       "9999-12-31 23:59:59"
        ev_start_date:     "2000-01-01 00:00:00"
        ev_null_value:     "^^"
        ev_field_separator: "||"
        catalog_bronze:    snap_dbx
        schema_bronze:     01_bronze
        catalog_silver:    snap_dbx
        schema_silver:     02_silver
        catalog_gold:      snap_dbx
        schema_gold:       03_gold
      libraries:
        - notebook:
            path: ./pipelines/01_bronze/raw/raw_py
        - notebook:
            path: ./pipelines/01_bronze/cdc/cdc_py
        - notebook:
            path: ./pipelines/02_silver/processed/processed_py
        - notebook:
            path: ./pipelines/02_silver/skey/skey_py
