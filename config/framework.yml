# config/framework.yml
# ──────────────────────────────────────────────────────
# Centralised framework configuration.
# Catalogs, schemas, and environment variables for all pipeline layers.
# All pipelines and the generator read from here — do not hardcode these values elsewhere.
# ──────────────────────────────────────────────────────

catalogs:
  bronze: snap_dbx
  silver: snap_dbx
  gold: snap_dbx

schemas:
  bronze: 01_bronze
  silver: 02_silver
  gold: 03_gold

environment:
  ev_config_root: "/Workspace/Users/dennehy.jack01@gmail.com/snap-dbx-framework/config"
  ev_end_date: "9999-12-31 23:59:59"      # effective-to sentinel for current records
  ev_start_date: "2000-01-01 00:00:00"    # default effective-from for initial loads
  ev_null_value: "^^"                     # null sentinel applied across the pipeline
  ev_field_separator: "||"               # field separator for compounding business keys
