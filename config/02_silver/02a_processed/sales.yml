# config/02_silver/02a_processed/{object_name}.yml
# ──────────────────────────────────────────────────────
# Silver Processed — typecasting and basic cleansing only.
#
# Reads from the bronze CDC stream.
# Scope: CAST, TRIM, NULLIF, date parsing.
# No joins. No business logic. No skey resolution.
# If it needs a join, it belongs in consolidation.
#
# Audit column renames (__START_AT → __etl_effective_from, etc.) are applied
# automatically by the framework — do not add them here.
# ──────────────────────────────────────────────────────

# ── Source ──────────────────────────────────────────
source_object: tbl_b_cdc_sales

# ── Target ──────────────────────────────────────────
object_name: tbl_a_proc_sales
enabled: true
catalog: snap_dbx
schema: 02_silver
comment:                                 # Unity Catalog table COMMENT

# ── Read / Write Behaviour ───────────────────────────
write_mode: streaming_table
read_mode: stream

# ── Keys ─────────────────────────────────────────────
primary_key_columns:                     # populated from objects.yml
  - order_id

# ── Column Ordering ──────────────────────────────────
leading_columns:                         # optional — columns to place first; everything else follows in source order
  - invoice_date
  - order_id

columns:
  - source_col: invoice_date
    target_col: invoice_date
    data_type: DATE
    expression: "TO_DATE(invoice_date, 'dd/MM/yyyy')"
 
  - source_col: sales_quantity
    target_col: quantity
    data_type: INT
    expression:

  - source_col: sales_value
    target_col: value
    data_type: float
    expression:
  

