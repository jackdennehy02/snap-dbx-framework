# config/02_silver/02a_processed/{object_name}.yml
# ──────────────────────────────────────────────────────
# Silver Processed — typecasting and basic cleansing only.
#
# Reads from the bronze CDC stream.
# Scope: CAST, TRIM, NULLIF, date parsing.
# No joins. No business logic. No skey resolution.
# If it needs a join, it belongs in consolidation.
#
# Audit column renames (__START_AT → __etl_effective_from, etc.) are applied
# automatically by the framework — do not add them here.
# ──────────────────────────────────────────────────────

# ── Source ──────────────────────────────────────────
source_object: cdc_customer

# ── Target ──────────────────────────────────────────
object_name: processed_customer
enabled: true
catalog: snap_dbx
schema: 02_silver
comment:                                 # Unity Catalog table COMMENT

# ── Read / Write Behaviour ───────────────────────────
write_mode: streaming_table
read_mode: stream

# ── Keys ─────────────────────────────────────────────
primary_key_columns:                     # populated from objects.yml
  - customer_key

# ── Column Ordering ──────────────────────────────────
leading_columns:                         # optional — columns to place first; everything else follows in source order
  # - col_a
  # - col_b

# ── Columns ──────────────────────────────────────────
# Only define columns that need transformation. Everything else passes through automatically.
# Framework audit columns (__START_AT, __END_AT, __etl_is_current etc.) are handled by the framework.
columns:

  # - source_col: raw_amount
  #   target_col: amount
  #   data_type: DECIMAL(10,2)
  #   expression: "CAST(raw_amount AS DECIMAL(10,2))"
  #
  # - source_col: customer_text
  #   target_col: customer_text
  #   data_type: STRING
  #   expression: "NULLIF(TRIM(UPPER(customer_text)), '')"
  #
  # - source_col: event_date
  #   target_col: event_date
  #   data_type: DATE
  #   expression: "TO_DATE(event_date, 'yyyy-MM-dd')"
  
    
  - source_col: customer_text
    target_col: name
    data_type: STRING
    expression: 
  
  - source_col: address_no
    target_col: address
    data_type: STRING
    expression: 

  - source_col: customer_type
    target_col: type
    data_type: STRING
    expression: "UPPER(customer_type)"
  
  - source_col: postcode
    target_col: postcode
    data_type: STRING
    expression: "UPPER(TRIM(postcode))"
  
  - source_col: city
    target_col: city
    data_type: STRING
    expression: 
  
  - source_col: bank_account_no
    target_col: bank_account_number_full
    data_type: STRING
    expression: 
  
  - source_col: bank_account_no
    target_col: sort_code
    data_type: STRING
    expression: "SUBSTRING(bank_account_no, 1, 8)"

  - source_col: bank_account_no
    target_col: bank_account_number
    data_type: BIGINT
    expression: "SUBSTRING(bank_account_no, 10, 8)"





