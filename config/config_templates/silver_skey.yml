# config/silver/skey/{object_name}.yml
# ──────────────────────────────────────────────────────
# Silver SKEY — surrogate key mapping.
#
# Reads from the silver processed table as a materialized view (snapshot).
# Processed is a materialized view; streaming tables cannot read from MV sources.
# Insert-only — once a key is assigned it never changes.
#
# scd_type controls the hash input:
#   1 = hash of business_key_columns only
#       one skey per unique business key
#   2 = hash of business_key_columns + __etl_effective_from
#       one skey per version — new skey on each record change
#
# The framework generates the skey using MD5 hash of the
# key fields. No column mappings are required — the output
# table structure is standardised by the framework.
# ──────────────────────────────────────────────────────

# ── Source ──────────────────────────────────────────
source_object:                           # default: processed_{object}

# ── Target ──────────────────────────────────────────
object_name:                             # default: skey_{object}
enabled: true
catalog:                                 # override hop default
schema:                                  # override hop default
comment:                                 # Unity Catalog table COMMENT

# ── Read / Write Behaviour ───────────────────────────
write_mode: materialized_view            # materialized_view (required — source is a MV) | streaming_table (only if sourcing from append-only table)
read_mode: snapshot                      # snapshot = full table scan — required when write_mode is materialized_view | stream (streaming_table only)

# ── SKEY Configuration ───────────────────────────────
scd_type:                                # 1 = one skey per business key | 2 = one skey per version (default: 1 for facts, 2 for dimensions)

business_key_columns:                    # required — natural key(s) from source
  # - col_a
  # - col_b

skey_column:                             # required — defaults to {object}_skey
