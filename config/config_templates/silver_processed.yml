# config/silver/processed/{object_name}.yml
# ──────────────────────────────────────────────────────
# Silver Processed — typecasting and basic cleansing only.
#
# Reads from the bronze CDC table as a materialized view (snapshot).
# streaming_table is not valid here — APPLY CHANGES INTO writes via MERGE,
# which Delta streaming cannot read (DELTA_SOURCE_TABLE_IGNORE_CHANGES).
# Scope: CAST, TRIM, NULLIF, date parsing.
# No joins. No business logic. No skey resolution.
# If it needs a join, it belongs in consolidation.
#
# Audit column renames (__START_AT → __etl_effective_from, etc.) are applied
# automatically by the framework — do not add them here.
# ──────────────────────────────────────────────────────

# ── Source ──────────────────────────────────────────
source_object:                           # default: cdc_{object}

# ── Target ──────────────────────────────────────────
object_name:                             # default: processed_{object}
enabled: true
catalog:                                 # override hop default
schema:                                  # override hop default
comment:                                 # Unity Catalog table COMMENT

# ── Read / Write Behaviour ───────────────────────────
write_mode: materialized_view            # materialized_view (required — CDC source uses MERGE) | streaming_table (only if sourcing from append-only table)
read_mode: snapshot                      # snapshot = full table scan — required when write_mode is materialized_view | stream (streaming_table only)

# ── Keys ─────────────────────────────────────────────
primary_key_columns:                     # populated from objects.yml
  # - col_a

# ── Column Ordering ──────────────────────────────────
leading_columns:                         # optional — columns to place first; everything else follows in source order
  # - col_a
  # - col_b

# ── Columns ──────────────────────────────────────────
# Only define columns that need transformation. Everything else passes through automatically.
# Framework audit columns (__START_AT, __END_AT, __etl_is_current etc.) are handled by the framework.
columns:

  # - source_col: raw_col
  #   target_col: col
  #   data_type: DECIMAL(10,2)
  #   expression: "CAST(raw_col AS DECIMAL(10,2))"
