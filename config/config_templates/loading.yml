# config/loading/{object_name}.yaml
# ──────────────────────────────────────────────────────
# One file per object. Source-type determines which
# connection fields apply.
# Fields left blank inherit from hop_defaults.yaml.
# ──────────────────────────────────────────────────────

source_type:                             # cloud_storage | jdbc | kafka | lakehouse_federation

# ── Object ──────────────────────────────────────────
object_name:                             # required — target table name written to bronze
object_category:                         # reference | transactional | dimension | fact
enabled: true
comment:                                 # Unity Catalog table COMMENT

# ── Target ──────────────────────────────────────────
catalog:                                 # override hop default
schema:                                  # override hop default

# ── Behaviour ───────────────────────────────────────
ingestion_mode:                          # snapshot | streaming — inherits from hop_defaults if omitted
merge_strategy:                          # overwrite | append | upsert — inherits from hop_defaults if omitted
filter:                                  # SQL WHERE applied at read time
data_items:                              # column list for SELECT; null = SELECT *
source_updated_at_col:                   # optional — source column to use as __source_updated_at; defaults to file modification time
primary_key_columns:                     # required if merge_strategy: upsert
  # - col_a
  # - col_b

# ── Connection ──────────────────────────────────────
# Populate the block matching your source_type.

connection:

  # ── cloud_storage ────────────────────────────────
  source_connection:                     # external location name in Unity Catalog
  cloud_storage_path:                    # abfss://container@account.dfs.core.windows.net/path/
  cloud_storage_type:                    # csv | parquet | json | avro
  header:                                # boolean — csv only
  delimiter:                             # csv only
  null_value:                            # single string treated as null; inherits pipeline default if omitted

  # streaming-only (ignored when ingestion_mode: snapshot)
  cloud_ingestion_mode:                  # directory_listing | file_notifications
  cloud_schema_location:                 # autoloader schema checkpoint path — required if streaming
  cloud_archive_path:                    # move files here after ingestion — optional

  # ── jdbc ─────────────────────────────────────────
  # url:
  # driver:
  # dbtable:                             # table name or subquery
  # fetchsize:
  # numPartitions:
  # partitionColumn:
  # lowerBound:
  # upperBound:

  # ── kafka ─────────────────────────────────────────
  # bootstrap_servers:
  # topic:
  # starting_offsets:                    # earliest | latest | json offset map
  # schema_registry_url:

  # ── lakehouse_federation ──────────────────────────
  # connection_name:                     # Unity Catalog connection name
  # remote_catalog:
  # remote_schema:
  # remote_table:
