# config/objects.yml
# ──────────────────────────────────────────────────────
# Source system registry.
#
# Each source system defines connection details, hop defaults, and objects.
# Objects need only a name and primary key — everything else is inherited.
#
# Connection paths support the {object} placeholder, which is replaced with
# the object name at generation time.
#
# Object syntax:
#   object_name: primary_key_column           # single key
#   object_name: [key_col_1, key_col_2]       # composite key
#
# facts default to scd_type: 1.
# dimensions default to scd_type: 2.
#
# Hop IDs (l01, l02, l03) map to the layer names and schemas defined in
# databricks.yml — the architecture lives there, not here.
# ──────────────────────────────────────────────────────

source_systems:

  # ── Source System Name ──────────────────────────────
  # Replace with the logical source system name (e.g., sap_erp, salesforce, netsuite).
  <source_system>:

    source_type:                           # cloud_storage | jdbc | kafka | lakehouse_federation

    # ── Connection Parameters ──────────────────────────
    # Define source-specific connection details here.
    # Use {object} placeholder for dynamic object names.
    connection:
      source_connection:
      cloud_storage_path:
      cloud_storage_type:
      # ... other connection fields as needed

    # ── Layer Defaults ──────────────────────────────────
    # These defaults apply to all objects in this source system.
    # Override at the object level if needed.
    defaults:
      l01:
        enabled: true
        metadata_driven: true
        ingestion_mode: streaming
        merge_strategy: append
      l02:
        enabled: true
        metadata_driven: true
        sequence_by: __source_updated_at
        ignore_null_updates: false
      l03:
        enabled: true
        metadata_driven: true
        write_mode: materialized_view
        read_mode: snapshot

    # ── Object Catalog ──────────────────────────────────
    # List all dimensions and facts from this source system.
    # Format: object_name: primary_key_column (or list of columns for composite keys)
    dimensions:
      # example_dimension: dimension_key

    facts:
      # example_fact: [fact_key_1, fact_key_2]
