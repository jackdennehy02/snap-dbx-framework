# config/objects.yml
# ──────────────────────────────────────────────────────
# Source system registry.
#
# Each source system defines connection details, hop defaults, and objects.
# Objects need only a name and primary key — everything else is inherited.
#
# Connection paths support the {object} placeholder, which is replaced with
# the object name at generation time.
#
# Object syntax:
#   object_name: primary_key_column           # single key
#   object_name: [key_col_1, key_col_2]       # composite key
#
# facts default to scd_type: 1 at the skey layer.
# dimensions default to scd_type: 2.
# ──────────────────────────────────────────────────────

source_systems:

  sap_erp:

    source_type: cloud_storage

    connection:
      source_connection:
      cloud_storage_path: /Volumes/mock_cloud_source/mock_cloud_source_schema/source/{object}/
      cloud_storage_type: csv
      header: true
      delimiter: ","
      null_value:
      cloud_ingestion_mode:
      cloud_schema_location:
      cloud_archive_path:

    defaults:
      bronze:
        l01:
          enabled: true
          metadata_driven: true
          ingestion_mode: streaming
          merge_strategy: append
        l02:
          enabled: true
          metadata_driven: true
          sequence_by: __source_updated_at
          ignore_null_updates: false
      silver:
        l03:
          enabled: true
          metadata_driven: true
          write_mode: materialized_view
          read_mode: snapshot
        l04:
          enabled: true
          metadata_driven: true
          write_mode: materialized_view
          read_mode: snapshot

    dimensions:
      material: material_key
      customer: customer_key
      plant: plant_key
      component_bom: [parent_material_key, component_key]

    facts:
      sales: [plant_key, material_key, customer_key]
  
