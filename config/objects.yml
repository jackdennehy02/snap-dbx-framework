# config/objects.yml
# ──────────────────────────────────────────────────────
# Master object registry. One entry per object.
#
# The generator reads this file alongside hop_defaults.yml
# to produce the per-layer config files for each object.
# Only fields that differ from hop_defaults.yml are set —
# anything left blank is inherited from the hop default.
# ──────────────────────────────────────────────────────

objects:

  # ── Dimensions ─────────────────────────────────────

  customer:
    source_type: cloud_storage
    primary_key_columns:
      - customer_key
    bronze:
      raw:
        enabled: true
        metadata_driven: true
        object_name: raw_customer
      cdc:
        enabled: true
        metadata_driven: true
        object_name: cdc_customer
    silver:
      processed:
        enabled: true
        metadata_driven: true
        object_name: processed_customer
      skey:
        enabled: true
        metadata_driven: true
        object_name: skey_customer
    gold:
      consolidation:
        enabled: true
        metadata_driven: true
        object_name: cons_customer
      dimensional:
        enabled: true
        metadata_driven: true
        object_name: dim_customer

  material:
    source_type: cloud_storage
    primary_key_columns:
      - material_key
    bronze:
      raw:
        enabled: true
        metadata_driven: true
        object_name: raw_material
      cdc:
        enabled: true
        metadata_driven: true
        object_name: cdc_material
    silver:
      processed:
        enabled: true
        metadata_driven: true
        object_name: processed_material
      skey:
        enabled: true
        metadata_driven: true
        object_name: skey_material
    gold:
      consolidation:
        enabled: true
        metadata_driven: true
        object_name: cons_material
      dimensional:
        enabled: true
        metadata_driven: true
        object_name: dim_material


  plant:
    source_type: cloud_storage
    primary_key_columns:
      - plant_key
    bronze:
      raw:
        enabled: true
        metadata_driven: true
        object_name: raw_plant
      cdc:
        enabled: true
        metadata_driven: true
        object_name: cdc_plant
    silver:
      processed:
        enabled: true
        metadata_driven: true
        object_name: processed_plant
      skey:
        enabled: true
        metadata_driven: true
        object_name: skey_plant
    gold:
      consolidation:
        enabled: true
        metadata_driven: true
        object_name: cons_plant
      dimensional:
        enabled: true
        metadata_driven: true
        object_name: dim_plant


  # ── Facts ───────────────────────────────────────────

  sales:
    source_type: cloud_storage
    primary_key_columns:
      - order_id
    bronze:
      raw:
        enabled: true
        metadata_driven: true
        object_name: raw_sales
      cdc:
        enabled: true
        metadata_driven: true
        object_name: cdc_sales
    silver:
      processed:
        enabled: true
        metadata_driven: true
        object_name: processed_sales
      skey:
        enabled: true
        metadata_driven: true
        object_name: skey_sales
    gold:
      consolidation:
        enabled: true
        metadata_driven: false           # uses custom_sql — joins to dimension skey tables
        object_name: cons_sales
      dimensional:
        enabled: true
        metadata_driven: true
        object_name: fact_sales


  # ── Reference ───────────────────────────────────────

  component_bom:
    source_type: cloud_storage
    primary_key_columns:
      - component_key
    bronze:
      raw:
        enabled: true
        metadata_driven: true
        object_name: raw_component_bom
      cdc:
        enabled: true
        metadata_driven: true
        object_name: cdc_component_bom
    silver:
      processed:
        enabled: true
        metadata_driven: true
        object_name: processed_component_bom
      skey:
        enabled: true
        metadata_driven: true
        object_name: skey_component_bom
    gold:
      consolidation:
        enabled: true
        object_name: cons_component_bom
      dimensional:
        enabled: false
        object_name: dim_component_bom
