# config/objects.yml
# ──────────────────────────────────────────────────────
# Master object registry. One entry per object.
#
# The generator reads this file alongside hop_defaults.yml
# to produce the per-layer config files for each object.
# Only fields that differ from hop_defaults.yml are set —
# anything left blank is inherited from the hop default.
# ──────────────────────────────────────────────────────

objects:

  # ── Dimensions ─────────────────────────────────────

  customer:
    source_type: cloud_storage
    primary_key_columns:
      - customer_key
    bronze:
      raw:
        enabled: true
        metadata_driven: true
        object_name: tbl_a_raw_customer
      cdc:
        enabled: true
        metadata_driven: true
        object_name: tbl_b_cdc_customer
    silver:
      processed:
        enabled: true
        metadata_driven: true
        object_name: tbl_a_proc_customer
      skey:
        enabled: true
        metadata_driven: true
        object_name: tbl_b_skey_customer
      consolidation:
        enabled: true
        metadata_driven: true
        object_name: tbl_c_cons_customer
    gold:
      dimensional:
        enabled: true
        metadata_driven: true
        object_name: tbl_a_dim_material

  material:
    source_type: cloud_storage
    primary_key_columns:
      - material_key
    bronze:
      raw:
        enabled: true
        metadata_driven: true
        object_name: tbl_a_raw_material
      cdc:
        enabled: true
        metadata_driven: true
        object_name: tbl_b_cdc_material
    silver:
      processed:
        enabled: true
        metadata_driven: true
        object_name: tbl_a_proc_material
      skey:
        enabled: true
        metadata_driven: true
        object_name: tbl_b_skey_material
      consolidation:
        enabled: true
        metadata_driven: true
        object_name: tbl_c_cons_material
    gold:
      dimensional:
        enabled: true
        metadata_driven: true
        object_name: tbl_a_dim_material


  plant:
    source_type: cloud_storage
    primary_key_columns:
      - plant_key
    bronze:
      raw:
        enabled: true
        metadata_driven: true
        object_name: tbl_a_raw_plant
      cdc:
        enabled: true
        metadata_driven: true
        object_name: tbl_b_cdc_plant
    silver:
      processed:
        enabled: true
        metadata_driven: true
        object_name: tbl_a_proc_plant
      skey:
        enabled: true
        metadata_driven: true
        object_name: tbl_b_skey_plant
      consolidation:
        enabled: true
        metadata_driven: true
        object_name: tbl_c_cons_plant
    gold:
      dimensional:
        enabled: true
        metadata_driven: true
        object_name: tbl_a_dim_plant


  # ── Facts ───────────────────────────────────────────

  sales:
    source_type: cloud_storage
    primary_key_columns:
      - sales_key
    bronze:
      raw:
        enabled: true
        metadata_driven: true
        object_name: tbl_a_raw_sales
      cdc:
        enabled: true
        metadata_driven: true
        object_name: tbl_b_cdc_sales
    silver:
      processed:
        enabled: true
        metadata_driven: true
        object_name: tbl_a_proc_sales
      skey:
        enabled: false                   # facts don't produce skey tables
        object_name: tbl_b_skey_sales
      consolidation:
        enabled: true
        metadata_driven: false           # uses custom_sql — joins to dimension skey tables
        object_name: tbl_c_cons_sales
    gold:
      dimensional:
        enabled: true
        metadata_driven: true
        object_name: tbl_a_fact_sales


  # ── Reference ───────────────────────────────────────

  component_bom:
    source_type: cloud_storage
    primary_key_columns:
      - component_key
      - bom_key
    bronze:
      raw:
        enabled: true
        metadata_driven: true
        object_name: tbl_a_raw_component_bom
      cdc:
        enabled: true
        metadata_driven: true
        object_name: tbl_b_cdc_component_bom
    silver:
      processed:
        enabled: false
        object_name: tbl_a_proc_component_bom
      skey:
        enabled: false
        object_name: tbl_b_skey_component_bom
      consolidation:
        enabled: false
        object_name: tbl_c_cons_component_bom
    gold:
      dimensional:
        enabled: false
        object_name: tbl_a_dim_component_bom

