source_object: raw_sales

# ── Target ──────────────────────────────────────────
object_name: cdc_sales
enabled: true
catalog: dev_setl
schema: 01_bronze
comment:                                 # Unity Catalog table COMMENT

# ── Keys ─────────────────────────────────────────────
keys:                                    # required — business key column(s); populated from objects.yml
  - plant_key
  - material_key
  - customer_key

# ── CDC Control ──────────────────────────────────────
sequence_by: __source_updated_at
scd_type: 1
                                         # 2 = full version history (default)

apply_as_deletes:                        # optional — SQL condition to treat a row as a delete
                                         # e.g. "operation = 'DELETE'" (full loads only)
ignore_null_updates: false               # if true, null values in source won't overwrite existing values

track_history_column_list:               # optional — columns to track for SCD-2 history
                                         # if omitted, all non-key columns are tracked
  # - col_a
  # - col_b