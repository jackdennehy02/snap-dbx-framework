# config/02_silver/02b_skey/{object_name}.yml
# ──────────────────────────────────────────────────────
# Silver SKEY — surrogate key mapping.
#
# Reads from the silver processed stream.
# Insert-only — once a key is assigned it never changes.
#
# scd_type controls the hash input:
#   1 = hash of business_key_columns only
#       one skey per unique business key
#   2 = hash of business_key_columns + __etl_effective_from
#       one skey per version — new skey on each record change
#
# The framework generates the skey using MD5 hash of the
# key fields. No column mappings are required — the output
# table structure is standardised by the framework.
# ──────────────────────────────────────────────────────

# ── Source ──────────────────────────────────────────
source_object:                           # default: tbl_a_proc_{object}

# ── Target ──────────────────────────────────────────
object_name:                             # default: tbl_skey_{object}
enabled: true
catalog:                                 # override hop default
schema:                                  # override hop default
comment:                                 # Unity Catalog table COMMENT

# ── Read / Write Behaviour ───────────────────────────
write_mode: streaming_table
read_mode: stream

# ── SKEY Configuration ───────────────────────────────
scd_type: 2                              # 1 = one skey per business key | 2 = one skey per version

business_key_columns:                    # required — natural key(s) from source
  # - col_a
  # - col_b

skey_column:                             # required — name of the generated surrogate key column
                                         # default: {object}_skey (e.g. customer_skey)

# ── Date Columns ─────────────────────────────────────────────────────────────
# Optional. Date columns to convert to integer keys (YYYYMMDD) for joining to a date dimension.
# The column is replaced in-place — same name, integer type.
# Leave blank or omit to pass date columns through unchanged.
date_columns:
  # - invoice_date
