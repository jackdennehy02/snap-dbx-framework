# config/objects.yml
# ──────────────────────────────────────────────────────
# Master object registry. One entry per object.
#
# The generator reads this file alongside hop_defaults.yml
# to produce the per-layer config files for each object.
# Only set fields that differ from hop_defaults.yml — anything
# left blank is inherited from the hop default.
#
# Naming conventions:
#   Bronze raw:        tbl_raw_{object}  /  vw_raw_{object}
#   Bronze CDC:        tbl_cdc_{object}  /  vw_cdc_{object}
#   Silver processed:  tbl_proc_{object}
#   Silver SKEY:       tbl_skey_{object}
#   Silver CONS:       tbl_cons_{object}
#   Gold dimensional:  tbl_dim_{object}
#   Gold data mart:    tbl_mart_{object}
#
# Override object_name at any sub-layer to deviate from the convention.
# ──────────────────────────────────────────────────────

objects:

  # ── Object Name ────────────────────────────────────
  # Replace with the logical object name (e.g. customer, sales).
  <object_name>:

    object_alias:                          # optional display name
    source_type:                           # cloud_storage | jdbc | kafka | lakehouse_federation

    # ── Bronze ─────────────────────────────────────────
    # Two sub-layers: raw ingest and CDC.
    # Disable any sub-section by setting enabled: false.
    bronze:

      # raw — append-only ingest from source; produces config/loading/{object}.yml
      raw:
        enabled:                           # true | false — false skips generation entirely
        metadata_driven:                   # true = driven by YAML; false means manual Databricks work
        catalog:                           # override hop default
        schema:                            # override hop default
        object_name:                       # default: tbl_raw_{object}

      # cdc — full table comparison via vw_raw_ and vw_cdc_ views; produces config/bronze/cdc/{object}.yml
      # N/C/D records inserted into tbl_cdc_; identical records filtered out
      cdc:
        enabled:
        metadata_driven:
        catalog:
        schema:
        object_name:                       # default: tbl_cdc_{object}

    # ── Silver ─────────────────────────────────────────
    # Transformation layer. Each sub-section produces a separate config file.
    # Disable any sub-section by setting enabled: false.
    silver:

      # processed — typecasting and basic cleansing only; reads from bronze CDC stream
      # produces config/silver/processed/{object}.yml
      # no joins, no business logic, no skey resolution — if it needs a join, it belongs in consolidation
      processed:
        enabled:
        metadata_driven:
        catalog:
        schema:
        object_name:                       # default: tbl_proc_{object}

      # skey — surrogate key mapping; produces config/silver/skey/{object}.yml
      skey:
        enabled:
        metadata_driven:
        catalog:
        schema:
        object_name:                       # default: tbl_skey_{object}

      # consolidation — joins, skey resolution, business rules; produces config/silver/consolidation/{object}.yml
      consolidation:
        enabled:
        metadata_driven:
        catalog:
        schema:
        object_name:                       # default: tbl_cons_{object}

    # ── Gold ───────────────────────────────────────────
    # Consumption layer. Each sub-section produces a separate config file.
    gold:

      # dimensional — SCD-2 dimensions and fact tables; produces config/gold/dimensional/{object}.yml
      dimensional:
        enabled:
        metadata_driven:
        catalog:
        schema:
        object_name:                       # default: tbl_dim_{object}

      # data_mart — aggregations and calculations; produces config/gold/data_mart/{object}.yml
      data_mart:
        enabled:
        metadata_driven:
        catalog:
        schema:
        object_name:                       # default: tbl_mart_{object}
